<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microvellum Database Explorer</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Microvellum Database Explorer</h1>
            <p class="subtitle">Manufacturing Work Order Management System</p>
        </header>

        <main id="app">
            <!-- Loading spinner -->
            <div id="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Loading...</p>
            </div>

            <!-- VIEW 1: Project Selection -->
            <div id="project-view" class="view">
                <h2>Select a Project</h2>
                <div id="project-grid" class="project-grid">
                    <!-- Dynamically populated by JS -->
                </div>
            </div>

            <!-- VIEW 2: Work Orders for selected project -->
            <div id="workorder-view" class="view" style="display: none;">
                <div class="breadcrumb">
                    <button id="back-to-projects">← Back to Projects</button>
                    <span id="current-project"></span>
                </div>
                <h2>Work Orders</h2>
                <div id="workorder-grid" class="workorder-grid">
                    <!-- Dynamically populated by JS -->
                </div>
            </div>

            <!-- VIEW 3: Schema Detail (Production Plan) -->
            <div id="schema-view" class="view" style="display: none;">
                <div class="breadcrumb">
                    <button id="back-to-workorders">← Back to Work Orders</button>
                    <span id="current-schema"></span>
                </div>
                <div class="schema-content">
                    <h2>Work Order Processing Flow</h2>
                    <div id="processing-tree" class="processing-tree">
                        <!-- Summary cards + detail table rendered by JS -->
                    </div>
                </div>
            </div>

            <!-- Error message bar -->
            <div id="error-message" class="error-message" style="display: none;"></div>
        </main>
    </div>

    <!-- MODAL: Query Builder -->
    <div id="query-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close" onclick="closeQueryModal()">&times;</span>
            <h2>Query Builder</h2>
            <textarea id="sql-query" rows="8" placeholder="SELECT * FROM ..."></textarea>
            <button class="btn-primary" onclick="executeQuery()">Execute Query</button>
            <div id="query-results"></div>
        </div>
    </div>

    <!-- MODAL: Sheet Tracking -->
    <div id="sheet-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close" onclick="closeSheetModal()">&times;</span>
            <h2>Sheet Tracking</h2>
            <div class="form-group">
                <label for="scrapped-sheet">Scrapped Sheet Number:</label>
                <input id="scrapped-sheet" type="number" placeholder="Enter sheet number">
            </div>
            <div class="form-group">
                <label for="scrapped-station">Scrapped Station:</label>
                <input id="scrapped-station" type="number" placeholder="Enter station number">
            </div>
            <button class="btn-primary" onclick="runSheetTracking()">Run Sheet Tracking</button>
            <div id="sheet-results"></div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
